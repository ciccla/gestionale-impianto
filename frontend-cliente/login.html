<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Login Cliente</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-light: #f1f8e9;
      --text-light: #2e7d32;
      --accent: #2e7d32;
      --accent-dark: #1b5e20;
      --input-border: #c8e6c9;
      --danger: #c62828;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--bg-light);
      color: var(--text-light);
      display: flex;
      flex-direction: column;
    }

    header {
      background: white;
      padding: 10px 20px;
      border-bottom: 1px solid #dcedc8;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header img {
      height: 40px;
    }

    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 20px;
    }

    .login-container {
      background-color: #ffffff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: var(--accent);
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #33691e;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid var(--input-border);
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: var(--accent-dark);
    }

    .register-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .register-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: bold;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .notifica {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }
    .notifica.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .notifica.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #f1f1f1;
      color: #555;
      font-size: 0.9em;
      border-top: 1px solid #ccc;
    }
  </style>
</head>
<body>

<header>
  <img src="/img/logo.png" alt="Logo Ecodrin">
  <span style="font-weight:bold; color:var(--accent);">Area Clienti</span>
</header>

<div class="main-content">
  <div class="login-container">
    <h1>Login Cliente</h1>

    <form action="/cliente/login" method="POST" id="login-form" novalidate>
      <label for="username">Email o Username</label>
      <input type="text" id="username" name="username" required placeholder="es. mario.rossi@mail.it o mario.rossi">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="••••••••">

      <button type="submit">Accedi</button>
      <div id="notifica" class="notifica"></div>
    </form>

    <div class="register-link">
      Non hai un account? <a href="register.html">Registrati</a>
    </div>
  </div>
</div>

<footer>
  © 2025 Ecodrin - P.I: 03378791218 Tutti i diritti riservati
</footer>

<script>
  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const notifica = document.getElementById('notifica');
    notifica.style.display = 'none';
    notifica.className = 'notifica';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username || !password) {
      notifica.textContent = '⚠️ Compila tutti i campi.';
      notifica.classList.add('error');
      notifica.style.display = 'block';
      return;
    }

    try {
     const res = await fetch(this.action, {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  credentials: 'include', // necessario per mantenere la sessione e il cookie
  body: JSON.stringify({
    username,
    password,
    _csrf: window.__csrfToken // aggiunge il token CSRF
  })
});

      if (res.redirected) {
        window.location.href = res.url;
        return;
      }

      const text = await res.text();
      if (text && text.toLowerCase().includes('successo')) {
        notifica.textContent = '✅ Accesso effettuato con successo';
        notifica.classList.add('success');
        notifica.style.display = 'block';
        setTimeout(() => window.location.href = '/cliente/dashboard.html', 800);
      } else {
        notifica.textContent = text || '❌ Credenziali errate.';
        notifica.classList.add('error');
        notifica.style.display = 'block';
      }
    } catch (err) {
      notifica.textContent = '❌ Errore di rete. Riprova.';
      notifica.classList.add('error');
      notifica.style.display = 'block';
    }
  });
  
// === Recupera il token CSRF dal server e lo allega alla richiesta ===
(async () => {
  try {
    const res = await fetch('/csrf-token', { credentials: 'include' });
    const data = await res.json();
    window.__csrfToken = data.csrfToken;
    console.log('✅ CSRF token login impostato correttamente');
  } catch (err) {
    console.error('❌ Errore ottenendo CSRF token:', err);
  }
})();
</script>

</body>
</html>
